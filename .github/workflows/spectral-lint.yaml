name: Spectral API Lint

on:
  workflow_dispatch:
  schedule:
    - cron: '0 14 * * 1-5'   # Dias úteis, 11:00 BRT (14:00 UTC)
  push:
    branches: [main, master]
    paths:
      - 'examples/OAS/**'
      - '.github/workflows/spectral-lint.yaml'

jobs:
  spectral:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Checkout build config (repositório de dependências)
        uses: actions/checkout@v5
        with:
          repository: ${{ vars.BUILD_CONFIG_REPO || 'jbarrosaxway/apim-build-config' }}
          path: build-config
          token: ${{ secrets.BUILD_CONFIG_ACCESS_TOKEN || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          package-manager-cache: false

      - name: Install Spectral (repositório build-config)
        run: npm ci --prefix build-config || npm install --prefix build-config

      - name: Run Spectral and generate report
        id: spectral
        env:
          SPECTRAL_WORKSPACE: ${{ github.workspace }}
        run: |
          node build-config/scripts/spectral-report.js
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Upload Spectral report
        uses: actions/upload-artifact@v5
        with:
          name: spectral-report
          path: |
            spectral-report.md
            spectral-lint-results.json
          retention-days: 30

      - name: Summary
        run: |
          echo "## Spectral API Lint" >> $GITHUB_STEP_SUMMARY
          if [ -f spectral-report.md ]; then
            head -30 spectral-report.md >> $GITHUB_STEP_SUMMARY
          else
            echo "Nenhum relatório gerado (nenhuma especificação encontrada)." >> $GITHUB_STEP_SUMMARY
          fi
